<script>
    // --- CONFIGURATION ---
    // Added /test to the end of your URL
    const API_GATEWAY_URL = "https://0fc0qyeo25.execute-api.eu-north-1.amazonaws.com/dev/test";
    let previousLatency = 0;
    let latencyHistory = [];
    let labels = [];

    // --- CHART INITIALIZATION ---
    const ctx = document.getElementById('latencyChart').getContext('2d');
    const latencyChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Response Time (ms)',
                data: latencyHistory,
                borderColor: '#0d6efd',
                backgroundColor: 'rgba(13, 110, 253, 0.1)',
                fill: true,
                tension: 0.4
            }]
        },
        options: { responsive: true, scales: { y: { beginAtZero: true } } }
    });

    async function runTest() {
        const urlInput = document.getElementById('apiUrl').value;
        const methodInput = document.getElementById('method').value;
        const btn = document.getElementById('testBtn');
        
        if (!urlInput) {
            alert("Please enter a URL");
            return;
        }

        // UI Feedback
        btn.disabled = true;
        btn.innerText = "TESTING...";

        try {
            const response = await fetch(API_GATEWAY_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: urlInput, method: methodInput })
            });

            const data = await response.json();

            // 1. Update Metrics
            const currentLatency = data.responseTime;
            document.getElementById('currLatency').innerText = `${currentLatency} ms`;
            document.getElementById('currStatus').innerText = data.statusCode;

            // 2. Threshold Styling
            if (currentLatency > 500) {
                document.getElementById('currLatency').className = "text-danger";
            } else {
                document.getElementById('currLatency').className = "text-success";
            }

            // 3. Calculate Delta (Comparison)
            if (previousLatency > 0) {
                const diff = (currentLatency - previousLatency).toFixed(2);
                const color = diff > 0 ? 'text-danger' : 'text-success';
                const sign = diff > 0 ? '+' : '';
                document.getElementById('delta').innerHTML = `<span class="${color}">${sign}${diff} ms</span>`;
            }
            previousLatency = currentLatency;

            // 4. Update Chart
            const timeLabel = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            labels.push(timeLabel);
            latencyHistory.push(currentLatency);

            if (labels.length > 10) {
                labels.shift();
                latencyHistory.shift();
            }
            latencyChart.update();

        } catch (error) {
            console.error(error);
            alert("Connection Error: Check console or AWS CORS settings.");
        } finally {
            btn.disabled = false;
            btn.innerText = "RUN PERFORMANCE TEST";
        }
    }
</script>
</body>
</html>
