<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud-Native API Monitor | AWS Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .metric-card { border-left: 5px solid #0d6efd; transition: 0.3s; }
        .metric-card:hover { transform: translateY(-5px); }
        #latencyChart { max-height: 300px; }
    </style>
</head>
<body class="bg-light">

<div class="container py-5">
    <header class="pb-3 mb-4 border-bottom d-flex justify-content-between align-items-center">
        <h1 class="text-dark fw-bold">🚀 CloudMonitor <span class="text-primary">v2.0</span></h1>
        <span class="badge bg-dark">AWS Infrastructure: Lambda + DynamoDB</span>
    </header>

    <div class="row g-4">
        <div class="col-lg-4">
            <div class="card shadow-sm p-4 h-100">
                <h5 class="mb-3">New API Test</h5>
                <div class="mb-3">
                    <label class="form-label">HTTP Method</label>
                    <select id="method" class="form-select">
                        <option value="GET">GET (Retrieve)</option>
                        <option value="POST">POST (Create/Update)</option>
                    </select>
                </div>
                <div class="col-md-12 mb-3">
                    <label class="form-label">Endpoint URL</label>
                    <input type="text" id="apiUrl" class="form-control" placeholder="https://api.example.com/v1">
                </div>
                <button onclick="runTest()" id="testBtn" class="btn btn-primary w-100 py-2 fw-bold">RUN PERFORMANCE TEST</button>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="card shadow-sm p-4 h-100">
                <h5>Real-Time Performance Trend</h5>
                <canvas id="latencyChart"></canvas>
            </div>
        </div>

        <div class="col-12">
            <div class="row text-center">
                <div class="col-md-4">
                    <div class="card p-3 shadow-sm metric-card">
                        <small class="text-muted">Current Latency</small>
                        <h2 id="currLatency">0 ms</h2>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card p-3 shadow-sm metric-card border-info">
                        <small class="text-muted">Status Code</small>
                        <h2 id="currStatus">--</h2>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card p-3 shadow-sm metric-card">
                        <small class="text-muted">Vs. Previous Test</small>
                        <h2 id="delta">--</h2>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // --- CONFIGURATION ---
    const API_GATEWAY_URL = "https://0fc0qyeo25.execute-api.eu-north-1.amazonaws.com/dev/test";
    let previousLatency = 0;
    let latencyHistory = [];
    let labels = [];

    // --- CHART INITIALIZATION ---
    const ctx = document.getElementById('latencyChart').getContext('2d');
    const latencyChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Response Time (ms)',
                data: latencyHistory,
                borderColor: '#0d6efd',
                backgroundColor: 'rgba(13, 110, 253, 0.1)',
                fill: true,
                tension: 0.4
            }]
        },
        options: { responsive: true, scales: { y: { beginAtZero: true } } }
    });

    async function runTest() {
        const url = document.getElementById('apiUrl').value;
        const method = document.getElementById('method').value;
        const btn = document.getElementById('testBtn');

        if (!url) { alert("Please enter a URL"); return; }

        btn.disabled = true;
        btn.innerText = "TESTING...";

        try {
            const response = await fetch(API_GATEWAY_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: url, method: method })
            });

            const data = await response.json();

            // Update UI Metrics
            const currentLatency = data.responseTime;
            document.getElementById('currLatency').innerText = `${currentLatency} ms`;
            document.getElementById('currStatus').innerText = data.statusCode;

            // Threshold Styling (Red if > 500ms)
            document.getElementById('currLatency').className = currentLatency > 500 ? "text-danger" : "text-success";

            // Update Delta
            if (previousLatency > 0) {
                const diff = (currentLatency - previousLatency).toFixed(2);
                const color = diff > 0 ? 'text-danger' : 'text-success';
                document.getElementById('delta').innerHTML = `<span class="${color}">${diff > 0 ? '+' : ''}${diff} ms</span>`;
            }
            previousLatency = currentLatency;

            // Update Chart
            labels.push(new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' }));
            latencyHistory.push(currentLatency);
            if (labels.length > 10) { labels.shift(); latencyHistory.shift(); }
            latencyChart.update();

        } catch (error) {
            alert("Error: " + error.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "RUN PERFORMANCE TEST";
        }
    }
</script>
</body>
</html>
